<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>老人ホーム検索アプリ</title>
<style>
  :root {
    --bg: #f5f7fb;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --accent: #7c3aed;
    --accent2: #a78bfa;
    --line: #e5e7eb;
    --good: #0f766e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 40%, #ffffff 100%);
    color: var(--text);
  }
  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 14px 40px;
  }
  .hero {
    background: linear-gradient(135deg, #4f46e5, #7c3aed 70%, #a855f7);
    color: white;
    border-radius: 24px;
    padding: 22px 18px;
    box-shadow: 0 20px 35px rgba(79,70,229,0.20);
  }
  .hero h1 {
    margin: 0 0 8px;
    font-size: clamp(24px, 4vw, 36px);
  }
  .hero p {
    margin: 0;
    opacity: .95;
    line-height: 1.7;
  }
  .panel {
    background: rgba(255,255,255,0.95);
    margin-top: 18px;
    border-radius: 22px;
    padding: 16px;
    box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    border: 1px solid rgba(255,255,255,0.5);
  }
  .controls {
    display: grid;
    grid-template-columns: 1.2fr 1fr 1fr auto;
    gap: 12px;
  }
  .field label {
    display: block;
    font-size: 13px;
    margin-bottom: 6px;
    color: var(--muted);
    font-weight: 700;
  }
  .field input, .field select {
    width: 100%;
    border: 1px solid var(--line);
    background: white;
    border-radius: 14px;
    min-height: 48px;
    padding: 12px 14px;
    font-size: 15px;
  }
  .btns {
    display: flex;
    gap: 10px;
    align-items: end;
  }
  button {
    min-height: 48px;
    border: none;
    border-radius: 14px;
    padding: 12px 16px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
  }
  .primary {
    background: var(--accent);
    color: white;
  }
  .ghost {
    background: #f3f4f6;
    color: var(--text);
  }
  .toolbar {
    margin-top: 14px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
  }
  .stats {
    font-size: 14px;
    color: var(--muted);
  }
  .stats strong {
    color: var(--good);
    font-size: 18px;
  }
  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .actions button {
    background: white;
    border: 1px solid var(--line);
  }
  .list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
    margin-top: 18px;
  }
  .card {
    background: var(--card);
    border: 1px solid #ececf5;
    border-radius: 20px;
    padding: 16px;
    box-shadow: 0 10px 25px rgba(15, 23, 42, 0.06);
  }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }
  .tag {
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 999px;
    background: #f3e8ff;
    color: #6d28d9;
    font-weight: 700;
  }
  .name {
    font-size: 20px;
    font-weight: 800;
    line-height: 1.4;
    margin: 2px 0 10px;
  }
  .row {
    margin: 6px 0;
    font-size: 14px;
    line-height: 1.7;
  }
  .label {
    color: var(--muted);
    font-weight: 700;
  }
  .card-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .linkbtn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    text-decoration: none;
    border-radius: 12px;
    padding: 11px 14px;
    font-size: 14px;
    font-weight: 700;
    border: 1px solid var(--line);
    color: var(--text);
    background: white;
  }
  .linkbtn.tel {
    background: #ecfeff;
    color: #155e75;
    border-color: #bae6fd;
  }
  .linkbtn.map {
    background: #f5f3ff;
    color: #5b21b6;
    border-color: #ddd6fe;
  }
  .linkbtn.site {
    background: #eff6ff;
    color: #1d4ed8;
    border-color: #bfdbfe;
  }
  .empty {
    padding: 28px 16px;
    text-align: center;
    color: var(--muted);
    background: white;
    border: 1px dashed var(--line);
    border-radius: 18px;
    margin-top: 18px;
  }
  .footer-note {
    margin-top: 18px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.7;
  }
  @media (max-width: 860px) {
    .controls { grid-template-columns: 1fr; }
    .btns { align-items: stretch; }
    .list { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>老人ホーム検索アプリ</h1>
      <p>アップロードいただいたCSVをもとに作成した検索アプリです。事業所名・住所・市区町村で検索でき、電話発信や地図確認にも対応しています。</p>
    </section>

    <section class="panel">
      <div class="controls">
        <div class="field">
          <label for="keyword">キーワード検索</label>
          <input id="keyword" type="text" placeholder="事業所名・住所・市区町村・法人名など" />
        </div>
        <div class="field">
          <label for="pref">都道府県</label>
          <select id="pref"><option value="">すべて</option></select>
        </div>
        <div class="field">
          <label for="city">市区町村</label>
          <select id="city"><option value="">すべて</option></select>
        </div>
        <div class="btns">
          <button class="primary" id="searchBtn">検索</button>
          <button class="ghost" id="resetBtn">リセット</button>
        </div>
      </div>

      <div class="toolbar">
        <div class="stats">表示件数: <strong id="count">0</strong> 件 / 全 <span id="total">0</span> 件</div>
        <div class="actions">
          <button id="csvBtn">絞り込み結果をCSV保存</button>
          <button id="topBtn">上へ戻る</button>
        </div>
      </div>

      <div id="list" class="list"></div>
      <div id="empty" class="empty" style="display:none;">該当する事業所が見つかりませんでした。検索条件を変えてお試しください。</div>

      <div class="footer-note">
        ※ 地図はGoogleマップ検索へ移動します。<br>
        ※ 電話番号がある事業所はスマホでタップするとそのまま発信できます。<br>
        ※ 元データの内容に基づいて表示しているため、最新情報は各事業所へご確認ください。
      </div>
    </section>
  </div>

const els = {
  keyword: document.getElementById('keyword'),
  pref: document.getElementById('pref'),
  city: document.getElementById('city'),
  count: document.getElementById('count'),
  total: document.getElementById('total'),
  list: document.getElementById('list'),
  empty: document.getElementById('empty'),
  searchBtn: document.getElementById('searchBtn'),
  resetBtn: document.getElementById('resetBtn'),
  csvBtn: document.getElementById('csvBtn'),
  topBtn: document.getElementById('topBtn')
};

let filtered = [...DATA];

function uniq(arr) {
  return [...new Set(arr.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ja'));
}

function fillPrefectures() {
  const prefs = uniq(DATA.map(r => r.prefecture));
  els.pref.innerHTML = '<option value="">すべて</option>' + prefs.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
}

function fillCities() {
  const selectedPref = els.pref.value;
  const cities = uniq(DATA.filter(r => !selectedPref || r.prefecture === selectedPref).map(r => r.city));
  const current = els.city.value;
  els.city.innerHTML = '<option value="">すべて</option>' + cities.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
  if (cities.includes(current)) els.city.value = current;
}

function escapeHtml(str='') {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function normalize(str='') {
  return String(str).toLowerCase().replace(/\s+/g, ' ').trim();
}

function matchesKeyword(r, keyword) {
  if (!keyword) return true;
  const hay = normalize([
    r.prefecture, r.city, r.name, r.kana, r.service, r.address, r.building,
    r.full_address, r.phone, r.corp, r.office_no, r.days, r.days_note, r.url, r.remarks
  ].join(' '));
  return keyword.split(/\s+/).every(k => hay.includes(k));
}

function render() {
  const keyword = normalize(els.keyword.value);
  const pref = els.pref.value;
  const city = els.city.value;

  filtered = DATA.filter(r => {
    if (pref && r.prefecture !== pref) return false;
    if (city && r.city !== city) return false;
    if (!matchesKeyword(r, keyword)) return false;
    return true;
  });

  els.total.textContent = DATA.length.toLocaleString('ja-JP');
  els.count.textContent = filtered.length.toLocaleString('ja-JP');

  if (!filtered.length) {
    els.list.innerHTML = '';
    els.empty.style.display = 'block';
    return;
  }

  els.empty.style.display = 'none';
  els.list.innerHTML = filtered.map(r => {
    const phone = r.phone ? `<a class="linkbtn tel" href="tel:${String(r.phone).replace(/[^0-9+]/g,'')}">📞 電話する</a>` : '';
    const mapQuery = encodeURIComponent(r.full_address || `${r.prefecture} ${r.city} ${r.name}`);
    const map = `<a class="linkbtn map" href="https://www.google.com/maps/search/?api=1&query=${mapQuery}" target="_blank" rel="noopener noreferrer">🗺 地図を見る</a>`;
    const site = r.url ? `<a class="linkbtn site" href="${escapeHtml(r.url)}" target="_blank" rel="noopener noreferrer">🌐 公式サイト</a>` : '';
    const capacity = r.capacity ? `<div class="row"><span class="label">定員:</span> ${escapeHtml(r.capacity)}</div>` : '';
    const days = r.days ? `<div class="row"><span class="label">利用可能曜日:</span> ${escapeHtml(r.days)}${r.days_note ? ' / ' + escapeHtml(r.days_note) : ''}</div>` : '';
    const officeNo = r.office_no ? `<div class="row"><span class="label">事業所番号:</span> ${escapeHtml(r.office_no)}</div>` : '';
    const corp = r.corp ? `<div class="row"><span class="label">法人名:</span> ${escapeHtml(r.corp)}</div>` : '';

    return `
      <article class="card">
        <div class="tags">
          <span class="tag">${escapeHtml(r.prefecture || '')}</span>
          <span class="tag">${escapeHtml(r.city || '')}</span>
        </div>
        <div class="name">${escapeHtml(r.name || '名称未設定')}</div>
        <div class="row"><span class="label">サービス:</span> ${escapeHtml(r.service || '')}</div>
        <div class="row"><span class="label">住所:</span> ${escapeHtml(r.full_address || r.address || '')}</div>
        <div class="row"><span class="label">電話番号:</span> ${escapeHtml(r.phone || '未登録')}</div>
        ${corp}
        ${capacity}
        ${days}
        ${officeNo}
        <div class="card-actions">
          ${phone}
          ${map}
          ${site}
        </div>
      </article>
    `;
  }).join('');
}

function downloadCsv() {
  const headers = ['都道府県名','市区町村名','事業所名','サービスの種類','住所','電話番号','法人名','事業所番号','URL'];
  const rows = filtered.map(r => [
    r.prefecture, r.city, r.name, r.service, r.full_address, r.phone, r.corp, r.office_no, r.url
  ]);
  const csv = [headers, ...rows]
    .map(row => row.map(val => {
      const s = String(val ?? '');
      return /[",\n]/.test(s) ? '"' + s.replaceAll('"', '""') + '"' : s;
    }).join(','))
    .join('\n');
  const blob = new Blob(["\uFEFF" + csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '老人ホーム検索_絞り込み結果.csv';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}

els.pref.addEventListener('change', () => {
  fillCities();
  render();
});
els.city.addEventListener('change', render);
els.keyword.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') render();
});
els.searchBtn.addEventListener('click', render);
els.resetBtn.addEventListener('click', () => {
  els.keyword.value = '';
  els.pref.value = '';
  fillCities();
  els.city.value = '';
  render();
});
els.csvBtn.addEventListener('click', downloadCsv);
els.topBtn.addEventListener('click', () => window.scrollTo({top: 0, behavior: 'smooth'}));

fillPrefectures();
fillCities();
render();
</script>
