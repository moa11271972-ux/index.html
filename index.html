    function uranai() {

        if (relationType === "片思い") score -= 2;
        if (relationType === "復縁") score -= 4;
        if (myNameSeed && partnerNameSeed && myNameSeed === partnerNameSeed) score += 3;
        score = Math.max(52, Math.min(98, score));

        const key = reduceNumber(myNum + partnerNum);

        const displayPartnerName = partnerName || "お相手";
