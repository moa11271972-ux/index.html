<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOA MOA 占術アプリ</title>
<style>
*{box-sizing:border-box}
:root{
  --pink:#f58ab2;--pink2:#ffd4e5;--lav:#d9c7ff;--cream:#fff9ef;--gold:#c8943f;
  --brown:#6c4a2b;--ink:#3f2b3d;--line:rgba(200,148,63,.28);
  --shadow:0 18px 45px rgba(129,83,120,.20)
}
body{
  margin:0;
  font-family:"Hiragino Maru Gothic ProN","Yu Gothic","Meiryo",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at top left,rgba(255,212,229,.95),transparent 32%),
    radial-gradient(circle at top right,rgba(217,199,255,.85),transparent 36%),
    linear-gradient(180deg,#fff8fc,#fffaf1 45%,#f8f0ff);
  min-height:100vh;
}
.app{max-width:1180px;margin:auto;padding:14px}
.hero{
  border-radius:30px;
  overflow:hidden;
  box-shadow:var(--shadow);
  border:1px solid var(--line);
  background:#fff;
}
.hero img{
  width:100%;
  display:block;
}
.mainGrid{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:16px;
  margin-top:16px;
}
@media(max-width:980px){.mainGrid{grid-template-columns:1fr}}
.panel{
  border:1px solid var(--line);
  border-radius:28px;
  padding:18px;
  background:rgba(255,255,255,.88);
  box-shadow:var(--shadow);
}
.title{
  font-size:24px;
  color:#7e4c6b;
  margin:0 0 8px;
  font-weight:900;
}
.sub{font-size:13px;line-height:1.8;color:#775f72;margin-bottom:14px}
.label{font-weight:900;font-size:13px;color:#7b5a2c;margin:14px 0 8px}
.row2,.row3{display:grid;gap:10px}
.row2{grid-template-columns:1fr 1fr}
.row3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:640px){.row2,.row3{grid-template-columns:1fr}}
input,select,textarea{
  width:100%;
  border:1px solid #ead5e8;
  border-radius:18px;
  padding:13px 14px;
  font-size:15px;
  background:#fff;
  color:var(--ink);
  outline:none;
}
textarea{min-height:110px;resize:vertical;line-height:1.8}
.btn{
  width:100%;
  border:none;
  border-radius:18px;
  padding:14px 16px;
  font-weight:900;
  font-size:15px;
  cursor:pointer;
}
.btn:active{transform:scale(.98)}
.btnMain{background:linear-gradient(135deg,#f779a8,#f6a25c);color:#fff;box-shadow:0 10px 20px rgba(245,138,178,.25)}
.btnSoft{background:#fff6fb;color:#81526d;border:1px solid #f0cfe2}
.btnGold{background:linear-gradient(135deg,#e5bd68,#c8943f);color:#fff}
.toggle.active{background:linear-gradient(135deg,#f779a8,#f6a25c);color:#fff}
.notice{
  border:1px solid #ead5e8;
  border-radius:18px;
  padding:12px;
  background:#fff7fb;
  font-size:13px;
  line-height:1.7;
}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{
  border:1px solid #f0cfe2;
  background:#fff;
  color:#7c4d68;
  border-radius:999px;
  padding:9px 12px;
  cursor:pointer;
  font-weight:800;
}
.hidden{display:none!important}
.resultPanel{
  min-height:780px;
  border-radius:30px;
  overflow:hidden;
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  background:linear-gradient(180deg,#fffdf8,#fff1f8 55%,#f8f1ff);
}
.resultHead{
  background:linear-gradient(135deg,#fff1f8,#f2eaff);
  padding:20px;
  text-align:center;
  border-bottom:1px solid var(--line);
}
.ribbon{
  display:inline-block;
  background:linear-gradient(135deg,#f779a8,#f6a25c);
  color:white;
  font-weight:900;
  border-radius:999px;
  padding:10px 22px;
  box-shadow:0 8px 18px rgba(247,121,168,.23);
}
.resultBody{padding:18px}
.fortuneCard{
  background:#fff;
  border:1px solid #ead5e8;
  border-radius:24px;
  padding:18px;
  box-shadow:0 10px 25px rgba(129,83,120,.11);
}
.bigLuck{text-align:center;padding:14px;border-radius:20px;background:linear-gradient(180deg,#fff9fb,#fff)}
.bigLuck .smallT{font-size:17px;color:#7b5a2c;font-weight:900}
.bigLuck .daikichi{font-size:58px;color:#e46587;font-weight:900;letter-spacing:.08em;line-height:1.1}
.scoreGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px}
@media(max-width:640px){.scoreGrid{grid-template-columns:1fr}}
.scoreBox{border:1px solid #ead5e8;border-radius:18px;padding:12px;background:#fffafc}
.scoreBox b{display:block;color:#7e4c6b;margin-bottom:4px}
.stars{color:#d9a443;font-size:18px;letter-spacing:1px}
.characters{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
@media(max-width:640px){.characters{grid-template-columns:1fr}}
.charBox{
  display:grid;
  grid-template-columns:74px 1fr;
  gap:10px;
  align-items:center;
  background:rgba(255,255,255,.76);
  border:1px solid #ead5e8;
  border-radius:24px;
  padding:12px;
}
.avatar{
  width:74px;height:74px;border-radius:50%;
  display:grid;place-items:center;
  background:linear-gradient(135deg,#3b274f,#7b4c8f);
  border:2px solid #e8c081;
  color:#fff;
  font-size:34px;
}
.avatar.left:before{content:"🔮"}
.avatar.right:before{content:"📖"}
.bubble{
  background:#fff;
  border:1px solid #ead5e8;
  border-radius:18px;
  padding:12px;
  color:#6c4a2b;
  line-height:1.7;
  font-weight:800;
}
.block{
  margin-top:14px;
  padding:15px;
  border-radius:20px;
  background:#fff;
  border:1px solid #ead5e8;
  line-height:1.85;
}
.block h3{margin:0 0 8px;color:#7e4c6b}
.miniGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:760px){.miniGrid{grid-template-columns:1fr 1fr}}
.mini{background:#fff8fc;border:1px solid #ead5e8;border-radius:16px;padding:10px;text-align:center}
.mini .k{font-size:12px;color:#7b5a2c;font-weight:900}
.mini .v{font-size:16px;font-weight:900;color:#e46587}
.table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
.table th,.table td{border:1px solid #ead5e8;padding:8px;text-align:left}
.table th{background:#fff1f8;color:#7e4c6b}
.lock{background:#fff4e7;border:1px solid #e8c081;color:#6c4a2b;border-radius:18px;padding:14px;line-height:1.8;margin-top:14px}
.tag{
  display:inline-block;
  background:#fff4fb;
  border:1px solid #ead5e8;
  border-radius:999px;
  padding:7px 10px;
  margin:4px;
  color:#7e4c6b;
  font-weight:800;
  font-size:12px;
}
.bottomNav{
  position:sticky;
  bottom:8px;
  margin-top:16px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.9);
  border-radius:26px;
  padding:8px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  box-shadow:var(--shadow);
}
.navItem{text-align:center;padding:8px 4px;color:#7e4c6b;font-size:12px;font-weight:900;border-radius:18px}
.navItem.active{background:#ffd4e5;color:#fff}
@media print{
  body{background:#fff}
  .inputPanel,.hero,.bottomNav{display:none!important}
  .app{padding:0}
  .mainGrid{display:block}
  .resultPanel{box-shadow:none;border:none}
  .resultHead{background:#fff}
}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <img src="moa-moa-illustration.png" alt="MOA MOA 占術アプリ">
  </div>

  <main class="mainGrid">
    <section class="panel inputPanel">
      <h1 class="title">🔮 MOA MOA 鑑定入力</h1>
      <div class="sub">このイラストの雰囲気で、実際に鑑定結果が出る動くアプリです。</div>

      <div class="label">プラン</div>
      <div class="row2">
        <button id="freeBtn" class="btn btnSoft toggle active" type="button">無料版</button>
        <button id="premiumBtn" class="btn btnSoft toggle" type="button">有料版</button>
      </div>

      <div class="label">鑑定モード</div>
      <div class="row3">
        <button id="singleBtn" class="btn btnSoft toggle active" type="button">1人鑑定</button>
        <button id="compatBtn" class="btn btnSoft toggle" type="button">2人相性</button>
        <button id="tripleBtn" class="btn btnSoft toggle" type="button">3人相性</button>
      </div>

      <div class="label">運用確認</div>
      <div class="notice">
        <label style="display:flex;gap:10px;align-items:flex-start">
          <input id="consentCheck" type="checkbox" style="margin-top:4px;transform:scale(1.2)">
          <span>本アプリは占いの参考表示です。医療・法律・税務・投資などの専門判断を代替せず、結果を保証または断定しません。</span>
        </label>
      </div>

      <div class="label">ご本人情報</div>
      <div class="row2">
        <input id="name" placeholder="お名前（任意）">
        <input id="birthDate" type="date">
      </div>
      <div class="row2" style="margin-top:10px">
        <input id="birthTime" type="time">
        <input id="birthPlace" placeholder="出生地（例：大阪府）">
      </div>
      <div class="row2" style="margin-top:10px">
        <select id="topic">
          <option value="">相談テーマ</option>
          <option>恋愛</option><option>不倫問題</option><option>復縁</option><option>片思い</option>
          <option>仕事</option><option>転職</option><option>独立</option><option>お金</option>
          <option>人間関係</option><option>結婚</option><option>家庭</option><option>健康</option><option>総合運</option>
        </select>
        <select id="gender">
          <option value="">性別</option><option>女性</option><option>男性</option><option>その他</option>
        </select>
      </div>

      <div id="partnerSection" class="hidden">
        <div class="label"><span id="partnerALabelTitle">お相手A情報</span></div>
        <div class="row2">
          <input id="partnerName" placeholder="お相手A名">
          <input id="partnerBirthDate" type="date">
        </div>
        <div class="row2" style="margin-top:10px">
          <input id="partnerBirthTime" type="time">
          <input id="partnerBirthPlace" placeholder="出生地（例：東京都）">
        </div>

        <div id="partnerBSection" class="hidden">
          <div class="label"><span id="partnerBLabelTitle">お相手B情報</span></div>
          <div class="row2">
            <input id="partner2Name" placeholder="お相手B名">
            <input id="partner2BirthDate" type="date">
          </div>
          <div class="row2" style="margin-top:10px">
            <input id="partner2BirthTime" type="time">
            <input id="partner2BirthPlace" placeholder="出生地（例：兵庫県）">
          </div>
        </div>

        <div class="row2" style="margin-top:10px">
          <select id="relationshipPreset">
            <option value="">関係ラベル</option>
            <option value="triangle">三角関係</option>
            <option value="family">家族関係</option>
            <option value="couple_child">夫婦と子ども</option>
            <option value="parent_child">親子</option>
            <option value="friends">友人関係</option>
          </select>
          <input id="caseLabel" placeholder="案件名（例：恋愛相性）">
        </div>
      </div>

      <div class="label">相談テンプレ</div>
      <div class="chips">
        <button class="chip" type="button" data-template="恋愛">恋愛</button>
        <button class="chip" type="button" data-template="不倫問題">不倫問題</button>
        <button class="chip" type="button" data-template="復縁">復縁</button>
        <button class="chip" type="button" data-template="片思い">片思い</button>
        <button class="chip" type="button" data-template="仕事">仕事</button>
        <button class="chip" type="button" data-template="転職">転職</button>
      </div>

      <div class="label">相談内容</div>
      <textarea id="question" placeholder="例：今後の恋愛運と、動くべき時期を知りたいです。"></textarea>

      <div class="label">操作</div>
      <div class="row2">
        <button id="generateBtn" class="btn btnMain" type="button">鑑定する</button>
        <button id="resetBtn" class="btn btnSoft" type="button">リセット</button>
      </div>
      <div class="row2" style="margin-top:10px">
        <button id="pdfBtn" class="btn btnGold" type="button">PDF保存</button>
        <button id="sampleBtn" class="btn btnSoft" type="button">有料版案内</button>
      </div>
    </section>

    <section class="resultPanel">
      <div class="resultHead">
        <span class="ribbon">本日の鑑定結果</span>
      </div>
      <div class="resultBody" id="result">
        <div class="fortuneCard">
          <div class="bigLuck">
            <div class="smallT">総合運</div>
            <div class="daikichi">大吉</div>
            <p>左側に入力して「鑑定する」を押してください。</p>
          </div>
        </div>
        <div class="characters">
          <div class="charBox">
            <div class="avatar left"></div>
            <div class="bubble">こんにちは♪ MOA MOAです。今日の運勢を一緒に見ていきます。</div>
          </div>
          <div class="charBox">
            <div class="avatar right"></div>
            <div class="bubble">生年月日と相談内容を入れると、鑑定結果をお伝えします。</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <nav class="bottomNav">
    <div class="navItem active">🏠<br>ホーム</div>
    <div class="navItem">⭐<br>お気に入り</div>
    <div class="navItem">🕘<br>履歴</div>
    <div class="navItem">♡<br>マイページ</div>
    <div class="navItem">☾<br>カレンダー</div>
  </nav>
</div>
<script src="app.js"></script>
</body>
</html>
