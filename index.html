


<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOA 占いアプリ</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
background:#f9f9fb;
color:#2c1b26;
}

.wrap{
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.tabs{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:20px;
}

.tab-btn{
padding:15px;
border:none;
border-radius:14px;
font-weight:bold;
cursor:pointer;
}

.active{
background:linear-gradient(135deg,#f5e7ae,#d8ae35);
color:#3a1f2d;
}

.inactive{
background:#fff;
border:1px solid #ddd;
}

.panel{display:none;}
.panel.active{display:block;}

.layout{
display:grid;
grid-template-columns:1fr 1fr;
gap:24px;
}

.card{
background:#fff;
padding:24px;
border-radius:20px;
border:1px solid #eee;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.section-title{
font-size:20px;
margin-bottom:12px;
color:#3a1f2d;
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:5px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.btn-main{
background:linear-gradient(135deg,#f5e7ae,#d8ae35);
}

.btn-sub{
background:#fff;
border:1px solid #ddd;
}

.result{
margin-top:20px;
padding:15px;
border-radius:15px;
background:#fff;
border:1px solid #eee;
line-height:1.8;
white-space:pre-line;
}

.price-box{
margin-top:20px;
padding:20px;
border-radius:15px;
background:#fff8dc;
}

.price{
font-size:28px;
font-weight:bold;
margin:10px 0;
}

@media(max-width:800px){
.layout{grid-template-columns:1fr;}
}
</style>

</head>

<body>
<div class="wrap">

<h1>MOA 占いアプリ</h1>

<div class="tabs">
<button id="freeBtn" class="tab-btn active">無料版</button>
<button id="paidBtn" class="tab-btn inactive">有料版</button>
</div>

<div id="freePanel" class="panel active">
<div class="layout">

<div class="card">
<h2 class="section-title">無料診断</h2>

<label>名前</label>
<input id="freeName">

<label>生年月日</label>
<input id="freeBirth" type="date">

<button class="btn-main" onclick="freeCheck()">診断する</button>
<button class="btn-sub" onclick="freeReset()">リセット</button>

<div id="freeResult" class="result"></div>

</div>

<div class="card">
<h2 class="section-title">無料でわかること</h2>
<ul>
<li>簡単な運勢</li>
<li>今の流れ</li>
<li>開運ヒント</li>
</ul>
</div>

</div>
</div>

<div id="paidPanel" class="panel">
<div class="layout">

<div class="card">
<h2 class="section-title">有料鑑定</h2>

<label>名前</label>
<input id="paidName">

<label>生年月日</label>
<input id="paidBirth" type="date">

<label>悩み</label>
<textarea id="paidWorry"></textarea>

<button class="btn-main" onclick="paidCheck()">鑑定する</button>
<button class="btn-sub" onclick="paidReset()">リセット</button>

<div id="paidResult" class="result"></div>

</div>

<div class="card">
<h2 class="section-title">有料版</h2>

<div class="price-box">
<div>詳細鑑定</div>
<div class="price">¥4,980</div>
</div>

<ul>
<li>詳しい運勢</li>
<li>恋愛・仕事・金運</li>
<li>開運方法</li>
</ul>

</div>

</div>
</div>

</div>

<script>

const freeBtn=document.getElementById("freeBtn");
const paidBtn=document.getElementById("paidBtn");
const freePanel=document.getElementById("freePanel");
const paidPanel=document.getElementById("paidPanel");

freeBtn.onclick=()=>{
freePanel.classList.add("active");
paidPanel.classList.remove("active");
freeBtn.classList.add("active");
paidBtn.classList.remove("active");
};

paidBtn.onclick=()=>{
paidPanel.classList.add("active");
freePanel.classList.remove("active");
paidBtn.classList.add("active");
freeBtn.classList.remove("active");
};

function freeCheck(){
let name=document.getElementById("freeName").value||"あなた";
let birth=document.getElementById("freeBirth").value;
if(!birth){alert("入力して下さい");return;}

document.getElementById("freeResult").textContent=
name+"さん\n運気が上昇しています。\n直感を信じて行動してください。";
}

function paidCheck(){
let name=document.getElementById("paidName").value||"あなた";
let birth=document.getElementById("paidBirth").value;
if(!birth){alert("入力して下さい");return;}

document.getElementById("paidResult").textContent=
name+"さん\n今は人生の転機です。\nあなたに必要な流れを整えることで未来が変わります。";
}

function freeReset(){
document.getElementById("freeName").value="";
document.getElementById("freeBirth").value="";
document.getElementById("freeResult").textContent="";
}

function paidReset(){
document.getElementById("paidName").value="";
document.getElementById("paidBirth").value="";
document.getElementById("paidWorry").value="";
document.getElementById("paidResult").textContent="";
}

</script>

</body>
</html>
